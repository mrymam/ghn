name: GHNApp
options:
  bundleIdPrefix: com.mrymam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

targets:
  GHNApp:
    type: application
    platform: macOS
    sources:
      - GHNApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrymam.ghn
        PRODUCT_NAME: GHN
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
    postBuildScripts:
      - name: Copy Go Binary
        script: |
          cp "${SRCROOT}/bin/ghn" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/MacOS/ghn-cli"
        basedOnDependencyAnalysis: false
